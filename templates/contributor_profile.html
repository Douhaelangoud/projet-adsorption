<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ contributor.name }} - Profil Contributeur</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(-45deg, #1abc9c, #2c3e50, #e74c3c, #3498db);
            background-size: 400% 400%;
            animation: gradient 15s ease infinite;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .profile-container {
            max-width: 800px;
            margin: 60px auto;
            background: rgba(255,255,255,0.95);
            border-radius: 18px;
            padding: 40px;
            box-shadow: 0 12px 35px rgba(0,0,0,0.18);
        }
        .profile-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .profile-avatar {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            display: block;
            margin: 0 auto 20px;
            object-fit: cover;
            box-shadow: 0 8px 20px rgba(26, 188, 156, 0.3);
            border: 4px solid rgba(255,255,255,0.8);
            background: #f5f5f5;
        }
        .profile-title {
            font-size: 32px;
            color: #2c3e50;
            margin-bottom: 5px;
        }
        .profile-role {
            font-size: 18px;
            color: #1abc9c;
            font-weight: 600;
            margin-bottom: 20px;
        }
        .profile-bio {
            color: #555;
            font-size: 16px;
            line-height: 1.6;
            margin-bottom: 25px;
        }
        .skills-section {
            margin-bottom: 25px;
        }
        .skills-title {
            color: #2c3e50;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .skills-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .skill-tag {
            background: rgba(26, 188, 156, 0.1);
            color: #1abc9c;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid rgba(26, 188, 156, 0.3);
        }
        .linkedin-section {
            text-align: center;
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }
        .linkedin-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #0077b5;
            text-decoration: none;
            font-weight: 600;
            padding: 10px 20px;
            border: 2px solid #0077b5;
            border-radius: 8px;
            transition: all 0.3s ease;
        }
        .linkedin-link:hover {
            background: #0077b5;
            color: white;
            text-decoration: none;
        }
        .back-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 25px;
            background: #1abc9c;
            color: white;
            border-radius: 10px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .back-btn:hover {
            background: #16a085;
            color: white;
        }
    </style>
</head>
<body>
    <div class="profile-container">
        <div class="profile-header">
            <img src="{{ url_for('static', filename='contributors/' ~ contributor.photo) }}" alt="{{ contributor.name }}" class="profile-avatar" onerror="this.onerror=null; this.src='https://via.placeholder.com/140?text=Photo'" />
            <h1 class="profile-title">{{ contributor.name }}</h1>
            <p class="profile-role">{{ contributor.role }}</p>
        </div>

        <div class="profile-content">
            <p class="profile-bio">{{ contributor.bio }}</p>

            <div class="skills-section">
                <h3 class="skills-title">Compétences</h3>
                <div class="skills-list">
                    {% for skill in contributor.skills %}
                    <span class="skill-tag">{{ skill }}</span>
                    {% endfor %}
                </div>
            </div>

            <div class="linkedin-section">
                <a href="{{ contributor.linkedin }}" target="_blank" class="linkedin-link">
                    <i class="bi bi-linkedin"></i> Voir sur LinkedIn
                </a>
            </div>
        </div>

        <div style="text-align: center;">
            <a href="{{ url_for('contributors') }}" class="back-btn">
                <i class="bi bi-arrow-left"></i> Retour à la liste des contributeurs
            </a>
        </div>
    </div>
</body>
</html>
