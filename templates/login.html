<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - UNIFAC App</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f9;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .login-container {
            background-color: white;
            padding: 30px 40px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            width: 300px;
        }

        .login-container h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .flash-message {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            font-size: 14px;
            text-align: center;
        }

        input[type="email"], input[type="password"] {
            width: 100%;
            padding: 10px;
            margin: 8px 0 16px;
            border: 1px solid #ccc;
            border-radius: 5px;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #0066cc;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #005bb5;
        }

        .links {
            margin-top: 15px;
            text-align: center;
            font-size: 14px;
        }

        .links a {
            color: #0066cc;
            text-decoration: none;
        }

        .links a:hover {
            text-decoration: underline;
        }

        #countdown {
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            color: #d00;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>Login</h2>

        <!-- Flash Messages -->
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <div class="flash-message">{{ message }}</div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <!-- Login Form -->
        <form action="/login" method="POST">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Enter your email" required>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" placeholder="Enter your password" required>

            <button type="submit">Login</button>
        </form>

        <!-- Countdown -->
        <div id="countdown"></div>

        <!-- Links -->
        <div class="links">
            <p><a href="{{ url_for('forgot_password') }}">Forgot Password?</a></p>
            <p>Don't have an account? <a href="/signup">Sign Up</a></p>
        </div>
    </div>

    <!-- JavaScript Countdown Timer -->
    <script>
        const flashText = document.querySelector('.flash-message');
        if (flashText && flashText.textContent.includes("no attempts left")) {
            let seconds = 60;
            const countdown = document.getElementById("countdown");
            const interval = setInterval(() => {
                seconds--;
                countdown.textContent = "⏳ You can try again in " + seconds + " second(s)...";
                if (seconds <= 0) {
                    clearInterval(interval);
                    countdown.textContent = "";
                }
            }, 1000);
        }
    </script>
</body>
</html>
