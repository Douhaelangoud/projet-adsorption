<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Données</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: #f5f7f5;
        }

        .card {
            margin-top: 50px;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
        }
    </style>
</head>

<body>

<div class="container" style="max-width:600px;">
    <div class="card">

        <h3 class="text-center mb-4">Entrer les paramètres</h3>

        <form method="POST" action="/resultats">

            <div class="mb-3">
                <label>G</label>
                <input type="number" step="any" name="G" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>L</label>
                <input type="number" step="any" name="L" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>m</label>
                <input type="number" step="any" name="m" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>y₀</label>
                <input type="number" step="any" name="y0" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>y objectif</label>
                <input type="number" step="any" name="y_obj" class="form-control" required>
            </div>

            <button type="submit" class="btn btn-success w-100">
                Calculer
            </button>

        </form>

    </div>
</div>

</body>
</html>
